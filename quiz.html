<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        #quiz-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        #question {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        #options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .option:hover {
            background: #e9e9e9;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        #navigation {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #results {
            text-align: center;
        }

        #score {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #667eea;
            font-weight: bold;
        }

        #answers-review {
            text-align: left;
            margin: 30px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .review-item {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .review-item.correct {
            border-left-color: #4caf50;
        }

        .review-item.incorrect {
            border-left-color: #f44336;
        }

        .review-question {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .review-answer {
            margin: 5px 0;
            padding-left: 10px;
        }

        .your-answer {
            color: #f44336;
        }

        .correct-answer {
            color: #4caf50;
        }

        #restart-btn {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            #quiz-container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            #question {
                font-size: 1.1rem;
            }

            .option {
                font-size: 1rem;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz-container">
            <h1>Simple Quiz App</h1>
            <div id="quiz">
                <div id="question-container">
                    <h2 id="question"></h2>
                    <div id="options"></div>
                </div>
                <div id="navigation">
                    <button id="prev-btn" style="display:none;">Previous</button>
                    <button id="next-btn">Next</button>
                    <button id="submit-btn" style="display:none;">Submit Quiz</button>
                </div>
            </div>
            <div id="results" style="display:none;">
                <h2>Quiz Complete!</h2>
                <p id="score"></p>
                <div id="answers-review"></div>
                <button id="restart-btn">Restart Quiz</button>
            </div>
        </div>
    </div>
    <script>
        const quizData = [
            {
                question: "What is the capital of France?",
                options: ["London", "Berlin", "Paris", "Madrid"],
                correct: 2
            },
            {
                question: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1
            },
            {
                question: "What is 2 + 2?",
                options: ["3", "4", "5", "6"],
                correct: 1
            },
            {
                question: "Who painted the Mona Lisa?",
                options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Michelangelo"],
                correct: 2
            },
            {
                question: "What is the largest ocean on Earth?",
                options: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"],
                correct: 3
            },
            {
                question: "Which programming language is known as the 'language of the web'?",
                options: ["Python", "JavaScript", "Java", "C++"],
                correct: 1
            },
            {
                question: "How many continents are there?",
                options: ["5", "6", "7", "8"],
                correct: 2
            },
            {
                question: "What is the smallest prime number?",
                options: ["0", "1", "2", "3"],
                correct: 2
            },
            {
                question: "Which animal is the largest mammal?",
                options: ["African Elephant", "Blue Whale", "Giraffe", "Polar Bear"],
                correct: 1
            },
            {
                question: "In which year did World War II end?",
                options: ["1943", "1944", "1945", "1946"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let score = 0;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const quizEl = document.getElementById('quiz');
        const resultsEl = document.getElementById('results');
        const scoreEl = document.getElementById('score');
        const answersReviewEl = document.getElementById('answers-review');
        const restartBtn = document.getElementById('restart-btn');

        function loadQuestion() {
            const current = quizData[currentQuestion];
            questionEl.textContent = `Question ${currentQuestion + 1} of ${quizData.length}: ${current.question}`;

            optionsEl.innerHTML = '';
            current.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.classList.add('option');
                optionDiv.textContent = option;

                if (userAnswers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }

                optionDiv.addEventListener('click', () => selectOption(index));
                optionsEl.appendChild(optionDiv);
            });

            updateNavigation();
        }

        function selectOption(index) {
            userAnswers[currentQuestion] = index;

            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) {
                    opt.classList.add('selected');
                }
            });
        }

        function updateNavigation() {
            prevBtn.style.display = currentQuestion > 0 ? 'inline-block' : 'none';

            if (currentQuestion === quizData.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function calculateScore() {
            score = 0;
            userAnswers.forEach((answer, index) => {
                if (answer === quizData[index].correct) {
                    score++;
                }
            });
        }

        function showResults() {
            calculateScore();
            quizEl.style.display = 'none';
            resultsEl.style.display = 'block';

            const percentage = ((score / quizData.length) * 100).toFixed(1);
            scoreEl.textContent = `You scored ${score} out of ${quizData.length} (${percentage}%)`;

            answersReviewEl.innerHTML = '';
            quizData.forEach((question, index) => {
                const reviewItem = document.createElement('div');
                reviewItem.classList.add('review-item');

                const isCorrect = userAnswers[index] === question.correct;
                reviewItem.classList.add(isCorrect ? 'correct' : 'incorrect');

                const questionDiv = document.createElement('div');
                questionDiv.classList.add('review-question');
                questionDiv.textContent = `${index + 1}. ${question.question}`;
                reviewItem.appendChild(questionDiv);

                if (userAnswers[index] !== null) {
                    const yourAnswerDiv = document.createElement('div');
                    yourAnswerDiv.classList.add('review-answer');
                    yourAnswerDiv.innerHTML = `<span class="${isCorrect ? 'correct-answer' : 'your-answer'}">Your answer: ${question.options[userAnswers[index]]}</span>`;
                    reviewItem.appendChild(yourAnswerDiv);
                } else {
                    const noAnswerDiv = document.createElement('div');
                    noAnswerDiv.classList.add('review-answer', 'your-answer');
                    noAnswerDiv.textContent = 'You did not answer this question';
                    reviewItem.appendChild(noAnswerDiv);
                }

                if (!isCorrect) {
                    const correctAnswerDiv = document.createElement('div');
                    correctAnswerDiv.classList.add('review-answer', 'correct-answer');
                    correctAnswerDiv.textContent = `Correct answer: ${question.options[question.correct]}`;
                    reviewItem.appendChild(correctAnswerDiv);
                }

                answersReviewEl.appendChild(reviewItem);
            });
        }

        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(quizData.length).fill(null);
            score = 0;

            resultsEl.style.display = 'none';
            quizEl.style.display = 'block';

            loadQuestion();
        }

        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        submitBtn.addEventListener('click', showResults);
        restartBtn.addEventListener('click', restartQuiz);

        loadQuestion();
    </script>
</body>
</html>
