<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takenlijst - Mijn Apps</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .app-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .app-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .app-header p {
            color: var(--color-text-light);
            font-size: 0.95rem;
        }
        .todo-app {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 2rem;
        }
        .todo-input-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .todo-input {
            flex: 1;
            padding: 0.6rem 0.9rem;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: var(--font-sans);
            color: var(--color-text);
            background: var(--color-bg);
            outline: none;
            transition: border-color 0.2s;
        }
        .todo-input:focus {
            border-color: var(--color-primary);
        }
        .btn-add {
            padding: 0.6rem 1.25rem;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-add:hover {
            background: var(--color-primary-dark);
        }
        .todo-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            background: transparent;
            font-size: 0.85rem;
            color: var(--color-text-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }
        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0.9rem;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-bg);
            transition: opacity 0.2s;
        }
        .todo-item.done {
            opacity: 0.55;
        }
        .todo-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--color-primary);
            cursor: pointer;
            flex-shrink: 0;
        }
        .todo-text {
            flex: 1;
            font-size: 0.95rem;
        }
        .todo-item.done .todo-text {
            text-decoration: line-through;
        }
        .btn-delete {
            background: none;
            border: none;
            color: var(--color-text-light);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }
        .btn-delete:hover {
            color: #dc2626;
            background: #fee2e2;
        }
        .todo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--color-text-light);
        }
        .btn-clear {
            background: none;
            border: none;
            color: var(--color-text-light);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }
        .btn-clear:hover {
            color: var(--color-primary);
        }
        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: var(--color-text-light);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="index.html">Mijn Blog</a></h1>
            <p class="tagline">Gedachten, ideeën en verhalen</p>
            <nav>
                <a href="index.html">Home</a>
                <a href="over.html">Over</a>
                <a href="todo.html" class="active">Takenlijst</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="app-header">
            <h2>Takenlijst App</h2>
            <p>Een eenvoudige app gehost op GitHub Pages &mdash; geen server nodig.</p>
        </div>

        <div class="todo-app">
            <div class="todo-input-row">
                <input
                    type="text"
                    id="todo-input"
                    class="todo-input"
                    placeholder="Voeg een nieuwe taak toe..."
                    maxlength="200"
                />
                <button class="btn-add" onclick="addTodo()">Toevoegen</button>
            </div>

            <div class="todo-filters">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Alles</button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Te doen</button>
                <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Klaar</button>
            </div>

            <ul class="todo-list" id="todo-list"></ul>

            <div class="todo-footer">
                <span id="todo-count"></span>
                <button class="btn-clear" onclick="clearDone()">Verwijder voltooide taken</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Mijn Blog. Gehost op GitHub Pages.</p>
        </div>
    </footer>

    <script>
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let currentFilter = 'all';

        function save() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;
            todos.unshift({ id: Date.now(), text, done: false });
            input.value = '';
            save();
            render();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) { todo.done = !todo.done; save(); render(); }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save();
            render();
        }

        function clearDone() {
            todos = todos.filter(t => !t.done);
            save();
            render();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('todo-list');
            const filtered = todos.filter(t => {
                if (currentFilter === 'active') return !t.done;
                if (currentFilter === 'done') return t.done;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<li class="empty-state">Geen taken gevonden.</li>';
            } else {
                list.innerHTML = filtered.map(t => `
                    <li class="todo-item ${t.done ? 'done' : ''}">
                        <input type="checkbox" class="todo-checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                        <span class="todo-text">${escapeHtml(t.text)}</span>
                        <button class="btn-delete" onclick="deleteTodo(${t.id})" title="Verwijder">&times;</button>
                    </li>
                `).join('');
            }

            const remaining = todos.filter(t => !t.done).length;
            document.getElementById('todo-count').textContent =
                `${remaining} taak${remaining !== 1 ? 'en' : ''} te doen`;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('todo-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTodo();
        });

        render();
    </script>
</body>
</html>
